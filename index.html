// ================================================================

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [on, setOn] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { setOn(true); io.disconnect(); } });
      },
      { threshold: 0.15 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: on ? 1 : 0,
      transform: on ? "none" : "translateY(24px)",
      transition: `opacity .9s ease ${delay}s, transform .9s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

// ================================================================

function SamplePlayer({ src, label }) {
  const [state, setState] = useState("idle");
  const [progress, setProgress] = useState(0);
  const audioRef = useRef(null);

  const play = async () => {
    if (!audioRef.current) return;
    setState("loading");
    try {
      await audioRef.current.play();
      setState("playing");
    } catch (e) {
      setState("error");
    }
  };
  const pause = () => {
    if (!audioRef.current) return;
    audioRef.current.pause();
    setState("idle");
  };

  if (!src) return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>試聴サンプルはただいま準備中です。</p>;
  if (state === "error") return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>お使いの環境では再生できませんでした。Instagramでサンプルを公開しています。</p>;

  return (
    <div style={{ marginTop: 14 }}>
      <audio
        ref={audioRef} src={src} preload="none" playsInline
        onTimeUpdate={(e) => { const el = e.currentTarget; if (el.duration) setProgress(el.currentTime / el.duration); }}
        onEnded={() => { setProgress(0); setState("idle"); }}
        onError={() => setState("error")}
        style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }}
      />
      <div style={{
        display: "flex", alignItems: "center", gap: 12,
        background: C.bg, border: `1px solid ${C.border}`, borderRadius: 999, padding: "8px 16px 8px 8px",
      }}>
        <button onClick={state === "playing" ? pause : play} aria-label={state === "playing" ? "一時停止" : "再生"}
          style={{
            width: 44, height: 44, borderRadius: "50%", flexShrink: 0,
            background: C.accent, border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
          {state === "loading" ? (
            <span style={{ color: "#fff", fontSize: 10 }}>…</span>
          ) : state === "playing" ? (
            <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="1" width="3.5" height="12" rx="1" fill="#fff" /><rect x="8.5" y="1" width="3.5" height="12" rx="1" fill="#fff" /></svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 1.5 L12 7 L3 12.5 Z" fill="#fff" /></svg>
          )}
        </button>
        <div style={{ flex: 1 }}>
          <p style={{ fontSize: 11, color: C.accent, letterSpacing: "0.15em", margin: "0 0 5px", textAlign: "left" }}>{label}</p>
          <div style={{ height: 5, background: "#E4D8CE", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ width: `${progress * 100}%`, height: "100%", background: C.accent, borderRadius: 999, transition: "width .1s linear" }} />
          </div>
        </div>
      </div>
      <p style={{ fontSize: 10.5, color: "#a39a8e", margin: "8px 0 0", textAlign: "left" }}>
        ※ 音が出ないときは、端末の音量をご確認ください
      </p>
    </div>
  );
}

function bgmDiagnose(answers) {
  const score = { emotional: 0, pop: 0, cinematic: 0, natural: 0 };
  answers.forEach((ansKey, qi) => {
    const opt = BGM_QUESTIONS[qi].opts.find((o) => o.key === ansKey);
    if (!opt) return;
    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const wishType = WISH_TO_TYPE[answers[2]];
  if (wishType && score[wishType] === firstPts) firstType = wishType;
  const secondType = sorted.map((e) => e[0]).find((t) => t !== firstType);
  return { firstType, secondType };
}

function BgmFlow({ onHome }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = BGM_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const diag = step === total ? bgmDiagnose(answers) : null;
  const result = diag ? BGM_RESULTS[diag.firstType] : null;
  const second = diag ? BGM_RESULTS[diag.secondType] : null;

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "96px 20px 64px" }}>

        <div style={{ width: 48, height: 1, background: C.accent, margin: "0 auto 12px" }} />
        <p style={{ fontSize: 13, lineHeight: 1.9, color: C.sub, margin: 0 }}>
          4つの質問で、おふたりのムービーに合う<br />BGMを診断して、その場で試聴できます。
        </p>
      </header>

      <Dots total={total} step={step} />

      {step < total ? (
        <div className="fadein" key={step}>
          <p style={{ textAlign: "center", fontSize: 12, color: C.accent, letterSpacing: "0.2em", margin: "0 0 6px" }}>
            Q{step + 1} / {total}
          </p>
          <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 18, fontWeight: 600, textAlign: "center", margin: "0 0 20px", lineHeight: 1.7 }}>
            {BGM_QUESTIONS[step].q}
          </h2>
          <div style={{ display: "grid", gap: 10 }}>
            {BGM_QUESTIONS[step].opts.map((o) => (
              <button key={o.key} className="optbtn" style={optStyle} onClick={() => pick(o.key)}>
                {o.label}
              </button>
            ))}
          </div>
          <BackLink onClick={step === 0 ? onHome : () => setStep(step - 1)}>
            {step === 0 ? "← トップに戻る" : "← ひとつ前に戻る"}
          </BackLink>
        </div>
      ) : (
        <div className="fadein">
          <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 16, padding: "28px 22px", textAlign: "center" }}>
            <Wave />
            <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: 0 }}>{result.en}</p>
            <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 22, fontWeight: 600, margin: "8px 0 14px", letterSpacing: "0.05em" }}>

              {result.desc}
            </p>
            <div style={{ background: C.bg, borderRadius: 10, padding: "12px 14px", textAlign: "left", fontSize: 12.5, lineHeight: 1.9, color: C.sub }}>

const TEGAMI_QUESTIONS = [
  {
    q: "親御さんとの思い出で、いちばん胸が熱くなるのは？",
    opts: [
      { label: "毎日のお弁当や、送り迎えの時間", key: "daily", pts: { thanks: 2, love: 1 } },

    ],
  },
  {

    opts: [
      { label: "ありがとう", key: "thanks", pts: { thanks: 3 } },

    ],
  },
];

const MEMORY_NOTE = {
  daily: "何気ない毎日こそ、いちばんの宝物だったこと。歌にすると、それがまっすぐ伝わります。",
  conflict: "うまく言えなかった時間があるからこそ、今日の言葉は深く届きます。",
  leaving: "見送ってくれたあの日の気持ちに、今度はあなたが応える番です。",
  friend: "近すぎて照れくさい関係だからこそ、歌なら素直に伝えられます。",
};

function tegamiDiagnose(answers) {
  const score = { thanks: 0, sorry: 0, watch: 0, love: 0 };
  answers.forEach((ansKey, qi) => {
    const opt = TEGAMI_QUESTIONS[qi].opts.find((o) => o.key === ansKey);
    if (!opt) return;
    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const closing = answers[1];
  if (closing && score[closing] === firstPts) firstType = closing;
  return firstType;
}

function TegamiFlow({ onHome }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = TEGAMI_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const resultKey = step === total ? tegamiDiagnose(answers) : null;
  const result = resultKey ? FEELINGS[resultKey] : null;

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "96px 20px 64px" }}>

      <Dots total={total} step={step} />

      {step < total ? (

              <a href="#contact" style={{ fontSize: 12, letterSpacing: "0.1em", color: C.sub, textDecoration: "none", fontWeight: 500 }}>相談する</a>
            </nav>
          ) : (
            <button onClick={() => go("home")}
              style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 12, letterSpacing: "0.1em", color: C.sub, fontWeight: 500 }}>
              ← トップ
            </button>
          )}
        </div>
      </header>

      <div className="fadein" key={mode}>
        {mode === "home" && <Landing onSelect={go} />}
        {mode === "bgm" && <BgmFlow onHome={() => go("home")} />}
        {mode === "tegami" && <TegamiFlow onHome={() => go("home")} />}
      </div>

      <footer style={{ textAlign: "center", padding: "26px 20px 34px", fontSize: 10.5, color: "#a39a8e", letterSpacing: "0.1em" }}>
        © Muse Movie — emotional milestone designer
      </footer>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
