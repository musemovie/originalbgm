// ================================================================
// スクロールで現れる演出

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [on, setOn] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { setOn(true); io.disconnect(); } });
      },
      { threshold: 0.15 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: on ? 1 : 0,
      transform: on ? "none" : "translateY(24px)",
      transition: `opacity .9s ease ${delay}s, transform .9s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

// ================================================================

function SamplePlayer({ src, label }) {
  const [state, setState] = useState("idle");
  const [progress, setProgress] = useState(0);
  const audioRef = useRef(null);

  const play = async () => {
    if (!audioRef.current) return;
    setState("loading");
    try {
      await audioRef.current.play();
      setState("playing");
    } catch (e) {
      setState("error");
    }
  };
  const pause = () => {
    if (!audioRef.current) return;
    audioRef.current.pause();
    setState("idle");
  };

  if (!src) return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>試聴サンプルはただいま準備中です。</p>;
  if (state === "error") return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>お使いの環境では再生できませんでした。Instagramでサンプルを公開しています。</p>;

  return (
    <div style={{ marginTop: 14 }}>
      <audio
        ref={audioRef} src={src} preload="none" playsInline
        onTimeUpdate={(e) => { const el = e.currentTarget; if (el.duration) setProgress(el.currentTime / el.duration); }}
        onEnded={() => { setProgress(0); setState("idle"); }}
        onError={() => setState("error")}
        style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }}
      />
      <div style={{
        display: "flex", alignItems: "center", gap: 12,
        background: C.bg, border: `1px solid ${C.border}`, borderRadius: 999, padding: "8px 16px 8px 8px",
      }}>
        <button onClick={state === "playing" ? pause : play} aria-label={state === "playing" ? "一時停止" : "再生"}
          style={{
            width: 44, height: 44, borderRadius: "50%", flexShrink: 0,
            background: C.accent, border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
          {state === "loading" ? (
            <span style={{ color: "#fff", fontSize: 10 }}>…</span>
          ) : state === "playing" ? (
            <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="1" width="3.5" height="12" rx="1" fill="#fff" /><rect x="8.5" y="1" width="3.5" height="12" rx="1" fill="#fff" /></svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 1.5 L12 7 L3 12.5 Z" fill="#fff" /></svg>
          )}
        </button>
        <div style={{ flex: 1 }}>
          <p style={{ fontSize: 11, color: C.accent, letterSpacing: "0.15em", margin: "0 0 5px", textAlign: "left" }}>{label}</p>
          <div style={{ height: 5, background: "#E4D8CE", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ width: `${progress * 100}%`, height: "100%", background: C.accent, borderRadius: 999, transition: "width .1s linear" }} />
          </div>
        </div>
      </div>
      <p style={{ fontSize: 10.5, color: "#a39a8e", margin: "8px 0 0", textAlign: "left" }}>
        ※ 音が出ないときは、端末の音量をご確認ください
      </p>
    </div>
  );
}

function bgmDiagnose(answers) {
  const score = { emotional: 0, pop: 0, cinematic: 0, natural: 0 };
  answers.forEach((ansKey, qi) => {
    const opt = BGM_QUESTIONS[qi].opts.find((o) => o.key === ansKey);
    if (!opt) return;
    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const wishType = WISH_TO_TYPE[answers[2]];
  if (wishType && score[wishType] === firstPts) firstType = wishType;
  const secondType = sorted.map((e) => e[0]).find((t) => t !== firstType);
  return { firstType, secondType };
}

function BgmFlow({ onHome, onOther }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = BGM_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const diag = step === total ? bgmDiagnose(answers) : null;
  const result = diag ? BGM_RESULTS[diag.firstType] : null;
  const second = diag ? BGM_RESULTS[diag.secondType] : null;

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "96px 20px 64px" }}>

        </p>
      </header>

      <Dots total={total} step={step} />

      {step < total ? (
        <div className="fadein" key={step}>
          <p style={{ textAlign: "center", fontSize: 12, color: C.accent, letterSpacing: "0.2em", margin: "0 0 6px" }}>
            Q{step + 1} / {total}
          </p>
          <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 18, fontWeight: 600, textAlign: "center", margin: "0 0 8px", lineHeight: 1.7 }}>
            {BGM_QUESTIONS[step].q}
          </h2>
          <p style={{ textAlign: "center", fontSize: 10.5, color: "#a39a8e", margin: "0 0 18px" }}>
            回答が保存されることはありません
          </p>
          <div style={{ display: "grid", gap: 10 }}>
            {BGM_QUESTIONS[step].opts.map((o) => (
              <button key={o.key} className="optbtn" style={optStyle} onClick={() => pick(o.key)}>
                {o.label}
              </button>
            ))}

          <BackLink onClick={step === 0 ? onHome : () => setStep(step - 1)}>
            {step === 0 ? "← トップに戻る" : "← ひとつ前に戻る"}

}

    desc: "照れくさくて言えなかった一言を、今日だけは伝える一曲。",
    lyrics: ["照れくさくて ずっと言えなかった", "今日だけは伝えるね 素直な気持ち", "生まれてきてよかった あなたの子で", "心から 大好きだよ"],
  },
};

const TEGAMI_QUESTIONS = [
  {
    q: "親御さんとの思い出で、いちばん胸が熱くなるのは？",
    opts: [
      { label: "毎日のお弁当や、送り迎えの時間", key: "daily", pts: { thanks: 2, love: 1 } },
      { label: "反抗して、うまく話せなかった時期", key: "conflict", pts: { sorry: 2 } },
      { label: "家を出た日、見送ってくれた背中", key: "leaving", pts: { watch: 2 } },
      { label: "なんでも話せる、友達みたいな関係", key: "friend", pts: { love: 2, thanks: 1 } },
    ],
  },
  {
    q: "手紙の結びに書きたい一言は？",
    opts: [
      { label: "ありがとう", key: "thanks", pts: { thanks: 3 } },
      { label: "ごめんね", key: "sorry", pts: { sorry: 3 } },
      { label: "見守っていてね", key: "watch", pts: { watch: 3 } },
      { label: "大好き", key: "love", pts: { love: 3 } },
    ],
  },
];

const MEMORY_NOTE = {
  daily: "何気ない毎日こそ、いちばんの宝物だったこと。歌にすると、それがまっすぐ伝わります。",
  conflict: "うまく言えなかった時間があるからこそ、今日の言葉は深く届きます。",
  leaving: "見送ってくれたあの日の気持ちに、今度はあなたが応える番です。",
  friend: "近すぎて照れくさい関係だからこそ、歌なら素直に伝えられます。",
};

function tegamiDiagnose(answers) {
  const score = { thanks: 0, sorry: 0, watch: 0, love: 0 };
  answers.forEach((ansKey, qi) => {
    const opt = TEGAMI_QUESTIONS[qi].opts.find((o) => o.key === ansKey);
    if (!opt) return;
    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const closing = answers[1];
  if (closing && score[closing] === firstPts) firstType = closing;
  return firstType;
}

function TegamiFlow({ onHome, onOther }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = TEGAMI_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const resultKey = step === total ? tegamiDiagnose(answers) : null;
  const result = resultKey ? FEELINGS[resultKey] : null;

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "96px 20px 64px" }}>
      <header style={{ textAlign: "center", marginBottom: 26 }}>
        <p style={{ letterSpacing: "0.35em", fontSize: 11, color: C.accent, margin: 0 }}>LETTER SONG</p>
        <h1 style={{ fontFamily: "'Noto Serif JP', serif", fontWeight: 600, fontSize: 24, margin: "10px 0 8px", letterSpacing: "0.08em" }}>
          手紙が、歌になる。<br />ミニ体験
        </h1>
        <div style={{ width: 48, height: 1, background: C.accent, margin: "0 auto 12px" }} />
        <p style={{ fontSize: 13, lineHeight: 1.9, color: C.sub, margin: 0 }}>
          2つの質問に答えると、あなたの気持ちに合う<br />
          「手紙の歌」を歌詞と一緒にその場で聴けます。
        </p>
      </header>

      <Dots total={total} step={step} />

      {step < total ? (
        <div className="fadein" key={step}>
          <p style={{ textAlign: "center", fontSize: 12, color: C.accent, letterSpacing: "0.2em", margin: "0 0 6px" }}>
            Q{step + 1} / {total}
          </p>
          <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 18, fontWeight: 600, textAlign: "center", margin: "0 0 8px", lineHeight: 1.7 }}>
            {TEGAMI_QUESTIONS[step].q}
          </h2>
          <p style={{ textAlign: "center", fontSize: 10.5, color: "#a39a8e", margin: "0 0 18px" }}>
            回答が保存されることはありません
          </p>
          <div style={{ display: "grid", gap: 10 }}>
            {TEGAMI_QUESTIONS[step].opts.map((o) => (
              <button key={o.key} className="optbtn" style={optStyle} onClick={() => pick(o.key)}>
                {o.label}
              </button>
            ))}
          </div>
          <BackLink onClick={step === 0 ? onHome : () => setStep(step - 1)}>
            {step === 0 ? "← トップに戻る" : "← ひとつ前に戻る"}
          </BackLink>
        </div>
      ) : (
        <div className="fadein">
          <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 16, padding: "28px 22px", textAlign: "center" }}>
            <Wave />
            <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: 0 }}>{result.en}</p>
            <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 21, fontWeight: 600, margin: "8px 0 6px", letterSpacing: "0.05em" }}>
              あなたの手紙は「{result.label}」の歌
            </h2>
            <p style={{ fontSize: 13.5, lineHeight: 1.9, color: "#4c463f", margin: "0 0 6px" }}>
              {result.desc}
            </p>
            <p style={{ fontSize: 12.5, lineHeight: 1.9, color: C.sub, textAlign: "left", margin: "10px 0 0" }}>
              {MEMORY_NOTE[answers[0]]}
            </p>

            <div style={{
              marginTop: 18,
              background: `repeating-linear-gradient(${C.paper}, ${C.paper} 37px, #EDE2DA 37px, #EDE2DA 38px)`,
              border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 18px 16px",
            }}>
              <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: "0 0 10px", textAlign: "center" }}>
                ── サビの歌詞 ──
              </p>
              {result.lyrics.map((line, i) => (
                <p key={i} className="lyricline"
                  style={{
                    fontFamily: "'Noto Serif JP', serif", fontSize: 15, lineHeight: "38px",
                    margin: 0, letterSpacing: "0.04em", textAlign: "left",
                    animationDelay: `${0.3 + i * 0.4}s`,
                  }}>
                  {line}
                </p>
              ))}
            </div>

            <SamplePlayer key={resultKey} src={AUDIO[resultKey]} label="この歌詞のサンプル曲" />

            <p style={{ fontSize: 12, lineHeight: 1.9, color: C.sub, textAlign: "left", marginTop: 16 }}>
              これは代表例としてお作りした一曲です。実際の制作では、<b>あなたが書いた手紙の言葉をそのまま歌詞にして</b>、世界にひとつの一曲に仕上げます。
            </p>
          </div>

          <Cta buttonText="手紙ソングについて相談する" />

          <button onClick={onOther} className="optbtn"
            style={{
              width: "100%", marginTop: 14, background: C.paper, border: `1px solid ${C.border}`,
              borderRadius: 16, padding: "16px 18px", textAlign: "left", cursor: "pointer", fontFamily: "inherit",
            }}>
            <p style={{ letterSpacing: "0.2em", fontSize: 9, color: C.accentDeep, fontWeight: 700, margin: "0 0 5px" }}>MINI EXPERIENCE 01</p>
            <p style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 15, fontWeight: 600, color: C.ink, margin: 0 }}>
              もうひとつの体験:オリジナルBGM診断 →
            </p>
          </button>

          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 18 }}>
            <button onClick={restart}
              style={{ background: "none", border: "none", color: "#8a8177", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>
              もう一度診断する
            </button>
            <button onClick={onHome}
              style={{ background: "none", border: "none", color: "#8a8177", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>
              トップに戻る
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

                ["できること", "プロフィールムービー/エンドロール/レターソング(手紙がそのまま歌に)/オリジナルBGM制作"],
                ["経歴", "元結婚式場スタッフ(披露宴50件以上)"],
                ["音楽制作", "AI作曲を活用したオリジナル楽曲。著作権申請の手間がないのも特長です"],
              ].map(([k, v], i) => (
                <div key={k} style={{
                  display: "flex", gap: 14, padding: "14px 18px",
                  borderTop: i === 0 ? "none" : `1px solid ${C.border}`,
                  fontSize: 12.5, lineHeight: 1.9,
                }}>
                  <span style={{ color: C.accentDeep, fontWeight: 700, flexShrink: 0, width: 70 }}>{k}</span>
                  <span style={{ color: C.ink }}>{v}</span>
                </div>
              ))}
            </div>
          </Reveal>
        </div>
      </section>

      {/* お問い合わせ */}
      <section id="contact" style={{ padding: "72px 24px 88px", background: C.panel }}>
        <div style={{ maxWidth: 640, margin: "0 auto", textAlign: "center" }}>
          <Reveal>
            <p style={{ letterSpacing: "0.3em", fontSize: 11, color: C.accentDeep, fontWeight: 700, margin: 0 }}>CONTACT</p>
            <h2 style={{
              fontFamily: "'Noto Serif JP', serif", fontWeight: 600,
              fontSize: "clamp(24px, 6vw, 30px)", letterSpacing: "0.14em", lineHeight: 1.8, margin: "14px 0 14px",
            }}>
              お問い合わせ
            </h2>
            <div style={{ width: 48, height: 1, background: C.accent, margin: "0 auto 26px" }} />
            <p style={{ fontSize: 13.5, lineHeight: 2.2, color: C.sub, margin: "0 0 28px" }}>
              ムービーのことでお手伝いできることがあれば、<br />お気軽にご相談ください。
            </p>
            <div style={{ display: "grid", gap: 10, maxWidth: 380, margin: "0 auto" }}>
              <a href={LINKS.coconala} target="_blank" rel="noreferrer"
                style={{ display: "block", background: C.accent, color: "#fff", borderRadius: 999, padding: "15px 16px", fontSize: 14, fontWeight: 700, textDecoration: "none" }}>
                ムービー制作について相談する
              </a>
              <a href={LINKS.instagram} target="_blank" rel="noreferrer"
                style={{
                  display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                  background: "transparent", color: C.ink, border: `1.5px solid ${C.accent}`,
                  borderRadius: 999, padding: "13px 16px", fontSize: 13.5, fontWeight: 700, textDecoration: "none",
                }}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={C.accentDeep} strokeWidth="1.8">
                  <rect x="2.5" y="2.5" width="19" height="19" rx="5.5" />
                  <circle cx="12" cy="12" r="4.3" />
                  <circle cx="17.4" cy="6.6" r="1.1" fill={C.accentDeep} stroke="none" />
                </svg>
                Instagramで作品を見る
              </a>
            </div>
          </Reveal>
        </div>
      </section>
    </div>
  );
}

// ================================================================
// アプリ本体
// ================================================================
function App() {
  const [mode, setMode] = useState("home"); // home | bgm | tegami

  const go = (m) => {
    setMode(m);
    window.scrollTo({ top: 0, behavior: "instant" in window ? "instant" : "auto" });
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.ink, fontFamily: "'Noto Sans JP', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { margin: 0; }
        .fadein { animation: fadein .45s ease; }
        @keyframes fadein { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: none;} }
        .optbtn { transition: background .15s ease, transform .1s ease, opacity .15s ease; }
        button.optbtn:hover { opacity: .88; }
        .optbtn:active { transform: scale(.985); }
        .lyricline { opacity: 0; animation: linein .7s ease forwards; }
        @keyframes linein { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }
        @keyframes rise { from { transform: scaleY(.2);} to { transform: scaleY(1);} }
        .bar { transform-origin: bottom; animation: rise .6s ease both; }
        @keyframes scrolldrop { 0% { transform: scaleY(0); transform-origin: top;} 45% { transform: scaleY(1); transform-origin: top;} 55% { transform: scaleY(1); transform-origin: bottom;} 100% { transform: scaleY(0); transform-origin: bottom;} }
        .scrolldot { animation: scrolldrop 2.2s ease-in-out infinite; }
        @media (prefers-reduced-motion: reduce) { .fadein, .bar, .scrolldot { animation: none; } .lyricline { animation: none; opacity: 1; } }
      `}</style>

      {/* 固定ヘッダー */}
      <header style={{
        position: "fixed", top: 0, left: 0, right: 0, zIndex: 50,
        background: "rgba(239,233,230,0.85)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
        borderBottom: `1px solid ${C.border}`,
      }}>
        <div style={{ maxWidth: 960, margin: "0 auto", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button onClick={() => go("home")}
            style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Noto Serif JP', serif", fontSize: 16, fontWeight: 600, letterSpacing: "0.14em", color: C.ink, padding: 0 }}>
            Muse Movie
          </button>
          {mode === "home" ? (
            <nav style={{ display: "flex", gap: 18 }}>
              <a href="#taiken" style={{ fontSize: 12, letterSpacing: "0.1em", color: C.sub, textDecoration: "none", fontWeight: 500 }}>ミニ体験</a>
              <a href="#about" style={{ fontSize: 12, letterSpacing: "0.1em", color: C.sub, textDecoration: "none", fontWeight: 500 }}>つくる人</a>
              <a href="#contact" style={{ fontSize: 12, letterSpacing: "0.1em", color: C.sub, textDecoration: "none", fontWeight: 500 }}>相談する</a>
            </nav>
          ) : (
            <button onClick={() => go("home")}
              style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 12, letterSpacing: "0.1em", color: C.sub, fontWeight: 500 }}>
              ← トップ
            </button>
          )}
        </div>
      </header>

      <div className="fadein" key={mode}>
        {mode === "home" && <Landing onSelect={go} />}
        {mode === "bgm" && <BgmFlow onHome={() => go("home")} onOther={() => go("tegami")} />}
        {mode === "tegami" && <TegamiFlow onHome={() => go("home")} onOther={() => go("bgm")} />}
      </div>

      <footer style={{ textAlign: "center", padding: "26px 20px 34px", fontSize: 10.5, color: "#a39a8e", letterSpacing: "0.1em" }}>
        © Muse Movie — emotional milestone designer
      </footer>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
