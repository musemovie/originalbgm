// ================================================================
// 共通:サンプル再生プレーヤー
// ================================================================
function SamplePlayer({ src, label }) {
  const [state, setState] = useState("idle"); // idle | loading | playing | error
  const [progress, setProgress] = useState(0);
  const audioRef = useRef(null);

  const play = async () => {
    if (!audioRef.current) return;
    setState("loading");
    try {
      await audioRef.current.play();
      setState("playing");
    } catch (e) {
      setState("error");
    }
  };

  const pause = () => {
    if (!audioRef.current) return;
    audioRef.current.pause();
    setState("idle");
  };

  if (!src) {
    return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>試聴サンプルはただいま準備中です。</p>;
  }
  if (state === "error") {
    return <p style={{ fontSize: 12, color: "#8a8177", marginTop: 14 }}>お使いの環境では再生できませんでした。Instagramでサンプルを公開しています。</p>;
  }

  return (
    <div style={{ marginTop: 14 }}>
      <audio
        ref={audioRef}
        src={src}
        preload="none"
        playsInline
        onTimeUpdate={(e) => {
          const el = e.currentTarget;
          if (el.duration) setProgress(el.currentTime / el.duration);
        }}
        onEnded={() => { setProgress(0); setState("idle"); }}
        onError={() => setState("error")}
        style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }}
      />
      <div style={{
        display: "flex", alignItems: "center", gap: 12,
        background: C.bg, border: `1px solid ${C.border}`, borderRadius: 999, padding: "8px 16px 8px 8px",
      }}>
        <button
          onClick={state === "playing" ? pause : play}
          aria-label={state === "playing" ? "一時停止" : "再生"}
          style={{
            width: 44, height: 44, borderRadius: "50%", flexShrink: 0,
            background: C.accent, border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
          {state === "loading" ? (
            <span style={{ color: "#fff", fontSize: 10 }}>…</span>
          ) : state === "playing" ? (
            <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="1" width="3.5" height="12" rx="1" fill="#fff" /><rect x="8.5" y="1" width="3.5" height="12" rx="1" fill="#fff" /></svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 1.5 L12 7 L3 12.5 Z" fill="#fff" /></svg>
          )}
        </button>
        <div style={{ flex: 1 }}>
          <p style={{ fontSize: 11, color: C.accent, letterSpacing: "0.15em", margin: "0 0 5px", textAlign: "left" }}>
            {label}
          </p>
          <div style={{ height: 5, background: "#E4D8CE", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ width: `${progress * 100}%`, height: "100%", background: C.accent, borderRadius: 999, transition: "width .1s linear" }} />
          </div>
        </div>
      </div>
      <p style={{ fontSize: 10.5, color: "#a39a8e", margin: "8px 0 0", textAlign: "left" }}>
        ※ 音が出ないときは、端末の音量をご確認ください
      </p>
    </div>
  );
}

const WISH_TO_TYPE = { cry: "emotional", smile: "pop", awe: "cinematic", warm: "natural" };

const BGM_SCENE_NOTE = {
  profile: "写真の切り替えと相性のよい、一定テンポの構成に仕上げるのがおすすめです。",
  letter: "お手紙の朗読やエンドロールに寄り添う、じゃまをしない音の設計が鍵になります。",

};
const BGM_VENUE_NOTE = {

  garden: "自然光あふれる会場には、生楽器のやわらかな質感がよく馴染みます。",

  undecided: "",

function bgmDiagnose(answers) {
  const score = { emotional: 0, pop: 0, cinematic: 0, natural: 0 };
  answers.forEach((ansKey, qi) => {
    const opt = BGM_QUESTIONS[qi].opts.find((o) => o.key === ansKey);
    if (!opt) return;
    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const wishType = WISH_TO_TYPE[answers[2]];
  if (wishType && score[wishType] === firstPts) firstType = wishType;
  const secondType = sorted.map((e) => e[0]).find((t) => t !== firstType);
  return { firstType, secondType };
}

function BgmFlow({ onHome }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = BGM_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const diag = step === total ? bgmDiagnose(answers) : null;
  const result = diag ? BGM_RESULTS[diag.firstType] : null;
  const second = diag ? BGM_RESULTS[diag.secondType] : null;

  return (
    <div>
      <header style={{ textAlign: "center", marginBottom: 26 }}>
        <p style={{ letterSpacing: "0.35em", fontSize: 11, color: C.accent, margin: 0 }}>MUSE MOVIE</p>

        <div style={{ width: 48, height: 1, background: C.accent, margin: "0 auto 12px" }} />
        <p style={{ fontSize: 13, lineHeight: 1.9, color: "#5c554d", margin: 0 }}>
          4つの質問で、おふたりのムービーに合う<br />BGMを診断して、その場で試聴できます。
        </p>
      </header>

      <Dots total={total} step={step} />

      {step < total ? (
        <div className="fadein" key={step}>
          <p style={{ textAlign: "center", fontSize: 12, color: C.accent, letterSpacing: "0.2em", margin: "0 0 6px" }}>
            Q{step + 1} / {total}
          </p>
          <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 18, fontWeight: 600, textAlign: "center", margin: "0 0 20px", lineHeight: 1.7 }}>
            {BGM_QUESTIONS[step].q}
          </h2>
          <div style={{ display: "grid", gap: 10 }}>
            {BGM_QUESTIONS[step].opts.map((o) => (
              <button key={o.key} className="optbtn" style={optStyle} onClick={() => pick(o.key)}>
                {o.label}
              </button>
            ))}
          </div>
          <BackLink onClick={step === 0 ? onHome : () => setStep(step - 1)}>
            {step === 0 ? "← 最初の選択に戻る" : "← ひとつ前に戻る"}
          </BackLink>
        </div>
      ) : (
        <div className="fadein">
          <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 16, padding: "28px 22px", textAlign: "center" }}>
            <Wave />
            <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: 0 }}>{result.en}</p>
            <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 22, fontWeight: 600, margin: "8px 0 14px", letterSpacing: "0.05em" }}>
              {result.name}
            </h2>
            <p style={{ fontSize: 13.5, lineHeight: 2, color: "#4c463f", textAlign: "left", margin: "0 0 14px" }}>
              {result.desc}
            </p>
            <div style={{ background: C.bg, borderRadius: 10, padding: "12px 14px", textAlign: "left", fontSize: 12.5, lineHeight: 1.9, color: "#5c554d" }}>
              <p style={{ margin: 0 }}><b style={{ color: C.accent }}>曲調</b>|{result.spec}</p>
              <p style={{ margin: "6px 0 0" }}>
                <b style={{ color: C.accent }}>おふたりへ</b>|{BGM_SCENE_NOTE[answers[0]]}{BGM_VENUE_NOTE[answers[1]]}
              </p>
            </div>

            <SamplePlayer key={diag.firstType} src={AUDIO[diag.firstType]} label="SAMPLE(30秒)" />

            <p style={{ fontSize: 11.5, color: "#8a8177", marginTop: 14, textAlign: "left" }}>
              次に近いタイプは「{second.name}」でした。「もう一度診断する」から別の答え方も試してみてください。
            </p>
          </div>

          <p style={{ fontSize: 12, lineHeight: 1.9, color: "#5c554d", textAlign: "center", margin: "18px 0 0" }}>
            Muse Movieでは、市販曲ではなく<b>おふたりのためだけに作曲したオリジナルBGM</b>を<br />ムービーとセットでお届けしています。
          </p>

          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 18 }}>

    for (const [type, p] of Object.entries(opt.pts)) score[type] += p;
  });
  const sorted = Object.entries(score).sort((a, b) => b[1] - a[1]);
  let firstType = sorted[0][0];
  const firstPts = sorted[0][1];
  const closing = answers[1];
  if (closing && score[closing] === firstPts) firstType = closing;
  return firstType;
}

function TegamiFlow({ onHome }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState([]);
  const total = TEGAMI_QUESTIONS.length;

  const pick = (key) => {
    const next = [...answers];
    next[step] = key;
    setAnswers(next);
    setStep(step + 1);
  };
  const restart = () => { setAnswers([]); setStep(0); };

  const resultKey = step === total ? tegamiDiagnose(answers) : null;
  const result = resultKey ? FEELINGS[resultKey] : null;

  return (
    <div>
      <header style={{ textAlign: "center", marginBottom: 26 }}>
        <p style={{ letterSpacing: "0.35em", fontSize: 11, color: C.accent, margin: 0 }}>MUSE MOVIE</p>
        <h1 style={{ fontFamily: "'Noto Serif JP', serif", fontWeight: 600, fontSize: 24, margin: "10px 0 8px", letterSpacing: "0.08em" }}>
          手紙が、歌になる。<br />ミニ体験
        </h1>
        <div style={{ width: 48, height: 1, background: C.accent, margin: "0 auto 12px" }} />
        <p style={{ fontSize: 13, lineHeight: 1.9, color: "#5c554d", margin: 0 }}>
          2つの質問に答えると、あなたの気持ちに合う<br />
          「手紙の歌」を歌詞と一緒にその場で聴けます。
        </p>
      </header>

      <Dots total={total} step={step} />

      {step < total ? (
        <div className="fadein" key={step}>
          <p style={{ textAlign: "center", fontSize: 12, color: C.accent, letterSpacing: "0.2em", margin: "0 0 6px" }}>
            Q{step + 1} / {total}
          </p>
          <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 18, fontWeight: 600, textAlign: "center", margin: "0 0 20px", lineHeight: 1.7 }}>
            {TEGAMI_QUESTIONS[step].q}
          </h2>
          <div style={{ display: "grid", gap: 10 }}>
            {TEGAMI_QUESTIONS[step].opts.map((o) => (
              <button key={o.key} className="optbtn" style={optStyle} onClick={() => pick(o.key)}>
                {o.label}
              </button>
            ))}
          </div>
          <BackLink onClick={step === 0 ? onHome : () => setStep(step - 1)}>
            {step === 0 ? "← 最初の選択に戻る" : "← ひとつ前に戻る"}
          </BackLink>
        </div>
      ) : (
        <div className="fadein">
          <div style={{ background: C.paper, border: `1px solid ${C.border}`, borderRadius: 16, padding: "28px 22px", textAlign: "center" }}>
            <Wave />
            <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: 0 }}>{result.en}</p>
            <h2 style={{ fontFamily: "'Noto Serif JP', serif", fontSize: 21, fontWeight: 600, margin: "8px 0 6px", letterSpacing: "0.05em" }}>
              あなたの手紙は「{result.label}」の歌
            </h2>
            <p style={{ fontSize: 13.5, lineHeight: 1.9, color: "#4c463f", margin: "0 0 6px" }}>
              {result.desc}
            </p>
            <p style={{ fontSize: 12.5, lineHeight: 1.9, color: "#5c554d", textAlign: "left", margin: "10px 0 0" }}>
              {MEMORY_NOTE[answers[0]]}
            </p>

            {/* 便箋風の歌詞プレビュー */}
            <div style={{
              marginTop: 18,
              background: `repeating-linear-gradient(${C.paper}, ${C.paper} 37px, #EDE2DA 37px, #EDE2DA 38px)`,
              border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 18px 16px",
            }}>
              <p style={{ letterSpacing: "0.3em", fontSize: 10, color: C.accent, margin: "0 0 10px", textAlign: "center" }}>
                ── サビの歌詞 ──
              </p>
              {result.lyrics.map((line, i) => (
                <p key={i} className="lyricline"
                  style={{
                    fontFamily: "'Noto Serif JP', serif", fontSize: 15, lineHeight: "38px",
                    margin: 0, letterSpacing: "0.04em", textAlign: "left",
                    animationDelay: `${0.3 + i * 0.4}s`,
                  }}>
                  {line}
                </p>
              ))}
            </div>

            <SamplePlayer key={resultKey} src={AUDIO[resultKey]} label="この歌詞のサンプル曲" />

            <p style={{ fontSize: 12, lineHeight: 1.9, color: "#5c554d", textAlign: "left", marginTop: 16 }}>
              これは代表例としてお作りした一曲です。実際の制作では、<b>あなたが書いた手紙の言葉をそのまま歌詞にして</b>、世界にひとつの一曲に仕上げます。
            </p>
          </div>

          <Cta buttonText="手紙ソングについて相談する" />

          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 18 }}>
            <button onClick={restart}
              style={{ background: "none", border: "none", color: "#8a8177", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>
              もう一度診断する
            </button>
            <button onClick={onHome}
              style={{ background: "none", border: "none", color: "#8a8177", fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", textDecoration: "underline" }}>
              最初の選択に戻る
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
